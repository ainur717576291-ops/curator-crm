<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Курс: Ученики</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#3B82F6;--blue-d:#2563EB;--blue-l:#EFF6FF;
  --green:#22C55E;--green-l:#F0FDF4;
  --amber:#F59E0B;--amber-l:#FFFBEB;
  --red:#EF4444;--red-l:#FEF2F2;
  --gray:#6B7280;--gray-l:#F9FAFB;--gray-m:#E5E7EB;
  --ink:#111827;--muted:#6B7280;--bg:#F3F4F6;--card:#fff;
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}

.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}

.hdr{background:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--gray-m);position:sticky;top:0;z-index:10;padding-top:calc(14px + env(safe-area-inset-top));}
.hdr-back{width:36px;height:36px;border-radius:10px;background:var(--gray-l);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0;}
.hdr-title{font-size:17px;font-weight:700;flex:1;}
.hdr-sub{font-size:12px;color:var(--muted);font-weight:400;}
.hdr-btn{padding:8px 14px;border-radius:10px;background:var(--blue-l);border:none;color:var(--blue-d);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;}

.content{flex:1;padding:14px 14px 24px;overflow-y:auto;}

.search-wrap{position:relative;margin-bottom:10px;}
.search-wrap input{width:100%;padding:10px 14px 10px 38px;border:1.5px solid var(--gray-m);border-radius:12px;font-family:inherit;font-size:14px;color:var(--ink);background:#fff;outline:none;}
.search-wrap input:focus{border-color:var(--blue);}
.search-wrap .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none;}

.filters{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;margin-bottom:12px;scrollbar-width:none;}
.filters::-webkit-scrollbar{display:none;}
.chip{border:1.5px solid var(--gray-m);background:#fff;border-radius:20px;padding:6px 13px;font-family:inherit;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.chip.on{border-color:var(--blue);background:var(--blue-l);color:var(--blue-d);}

.stats-bar{display:flex;gap:8px;margin-bottom:12px;}
.stat-card{flex:1;background:#fff;border-radius:12px;padding:10px 8px;box-shadow:var(--shadow);text-align:center;}
.stat-num{font-size:20px;font-weight:800;}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:1px;}

.student-card{background:var(--card);border-radius:14px;padding:13px;margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer;display:flex;align-items:flex-start;gap:11px;}
.sc-avatar{width:42px;height:42px;border-radius:12px;background:var(--blue-l);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--blue-d);flex-shrink:0;}
.sc-body{flex:1;min-width:0;}
.sc-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sc-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.sc-progress{display:flex;gap:3px;margin-top:7px;}
.sc-dot{width:18px;height:6px;border-radius:3px;background:var(--gray-m);}
.sc-dot.hw{background:var(--amber);}
.sc-dot.full{background:var(--green);}
.sc-dot.cur{background:var(--blue);}
.sc-arrow{color:var(--gray-m);font-size:20px;align-self:center;}

.badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;display:inline-block;}
.badge-active{background:var(--green-l);color:#15803D;}
.badge-frozen{background:#EFF6FF;color:#1D4ED8;}
.badge-done{background:var(--gray-l);color:var(--gray);}

.empty{text-align:center;padding:48px 16px;color:var(--muted);}
.empty .ei{font-size:44px;margin-bottom:10px;}

/* PROFILE */
.profile-hero{background:linear-gradient(135deg,#1e3a5f,#2563EB);color:#fff;padding:16px;padding-top:calc(16px + env(safe-area-inset-top));}
.ph-back{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.18);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.ph-name{font-size:20px;font-weight:800;margin-bottom:3px;}
.ph-sub{font-size:12px;opacity:.8;}
.ph-badges{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.ph-badge{padding:4px 11px;border-radius:9px;font-size:12px;font-weight:600;background:rgba(255,255,255,.18);}

.tabs{display:flex;background:#fff;border-bottom:1px solid var(--gray-m);position:sticky;top:0;z-index:5;}
.tab{flex:1;padding:11px 4px;border:none;background:none;font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;}
.tab.on{color:var(--blue-d);border-bottom-color:var(--blue);}
.tab-content{display:none;padding:14px 14px 24px;}
.tab-content.on{display:block;}

.info-card{background:#fff;border-radius:14px;padding:13px;margin-bottom:10px;box-shadow:var(--shadow);}
.info-card h4{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--gray-l);}
.info-row:last-child{border-bottom:none;padding-bottom:0;}
.ir-lbl{font-size:13px;color:var(--muted);flex-shrink:0;margin-right:10px;}
.ir-val{font-size:13px;font-weight:500;text-align:right;word-break:break-word;}
.ir-text{font-size:13px;line-height:1.55;margin-top:4px;color:var(--ink);}

.module-item{background:#fff;border-radius:14px;padding:13px;margin-bottom:8px;box-shadow:var(--shadow);}
.module-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.module-name{font-size:14px;font-weight:700;}
.module-status{font-size:12px;font-weight:600;padding:3px 9px;border-radius:7px;}
.ms-full{background:var(--green-l);color:#15803D;}
.ms-hw{background:var(--amber-l);color:#B45309;}
.ms-none{background:var(--gray-l);color:var(--gray);}
.ms-cur{background:var(--blue-l);color:var(--blue-d);}
.module-row{display:flex;align-items:center;gap:8px;margin-top:6px;}
.mcheck{font-size:14px;}
.module-sub{font-size:12px;color:var(--muted);}
.module-comment{font-size:12px;color:var(--ink);background:var(--gray-l);border-radius:8px;padding:6px 10px;margin-top:6px;line-height:1.4;}

.note-area{background:#fff;border-radius:14px;padding:13px;margin-bottom:10px;box-shadow:var(--shadow);}
.note-area h4{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.note-area textarea{width:100%;border:1.5px solid var(--gray-m);border-radius:10px;padding:10px;font-family:inherit;font-size:13px;resize:vertical;min-height:80px;outline:none;}
.note-area textarea:focus{border-color:var(--blue);}
.note-save{margin-top:8px;padding:9px 18px;background:var(--blue);color:#fff;border:none;border-radius:9px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:12px;color:var(--muted);}
.spinner{width:32px;height:32px;border:3px solid var(--gray-m);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.toast{position:fixed;bottom:calc(18px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 18px;border-radius:11px;font-size:13px;font-weight:600;z-index:100;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

.refresh-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--gray-l);border:none;border-radius:10px;font-family:inherit;font-size:13px;color:var(--muted);cursor:pointer;margin-bottom:12px;}
</style>
</head>
<body>

<!-- LIST SCREEN -->
<div class="screen active" id="s-list">
  <div class="hdr">
    <div>
      <div class="hdr-title">👩‍🎓 Ученики курса</div>
      <div class="hdr-sub" id="lastUpdated"></div>
    </div>
    <button class="hdr-btn" onclick="loadData()">↻ Обновить</button>
  </div>
  <div class="content">
    <div class="stats-bar" id="statsBar"></div>
    <div class="search-wrap">
      <span class="si">🔍</span>
      <input type="search" placeholder="Поиск по имени..." id="searchInput" oninput="renderList()">
    </div>
    <div class="filters">
      <button class="chip on" data-f="all" onclick="setFilter('all')">Все</button>
      <button class="chip" data-f="active" onclick="setFilter('active')">В процессе</button>
      <button class="chip" data-f="done" onclick="setFilter('done')">Завершили</button>
      <button class="chip" data-f="nomeeting" onclick="setFilter('nomeeting')">Нет созвона</button>
    </div>
    <div id="studentList"><div class="loading"><div class="spinner"></div><span>Загружаю данные...</span></div></div>
  </div>
</div>

<!-- PROFILE SCREEN -->
<div class="screen" id="s-profile">
  <div class="profile-hero" id="profileHero">
    <button class="ph-back" onclick="showScreen('s-list')">←</button>
    <div class="ph-name" id="phName">—</div>
    <div class="ph-sub" id="phSub">—</div>
    <div class="ph-badges" id="phBadges"></div>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="switchTab('info')">📋 Инфо</button>
    <button class="tab" onclick="switchTab('modules')">📚 Модули</button>
    <button class="tab" onclick="switchTab('notes')">✏️ Заметки</button>
  </div>
  <div class="tab-content on" id="tab-info"></div>
  <div class="tab-content" id="tab-modules"></div>
  <div class="tab-content" id="tab-notes"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const SHEET_ID = '1cD9jLk-9jYowr4NWpcJxpNi3Sgkrf5pE-pQ5PiGvsbM';
const SHEET_CSV = `https://api.allorigins.win/raw?url=${encodeURIComponent('https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/export?format=csv')}`;
const NOTES_KEY = 'crm_notes_v1';

const MODULE_HW = [
  'Д/з глоток воды',
  'Д/з тест уздечки',
  'Д/з видео жевание',
  'Д/з дыхание (КП)',
  'Д/з упр с1-21',
  'Д/з анкета и упр 27',
  'Д/з фото после',
  'Д/з ОПРОС',
];

// Module data starts at col 8, each module = 4 cols: hw, hw_comment, meeting, meeting_comment
const MOD_START = 8;
const MOD_SIZE = 4;

let students = [];
let notes = JSON.parse(localStorage.getItem(NOTES_KEY) || '{}');
let curFilter = 'all';
let curId = null;

function saveNotes() { localStorage.setItem(NOTES_KEY, JSON.stringify(notes)); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

/* ===== PARSE CSV ===== */
function parseCSV(text) {
  const rows = [];
  let cur = '', inQ = false, row = [];
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { row.push(cur); cur = ''; }
    else if ((c === '\n' || c === '\r') && !inQ) {
      if (cur || row.length) { row.push(cur); rows.push(row); }
      cur = ''; row = [];
      if (c === '\r' && text[i+1] === '\n') i++;
    } else { cur += c; }
  }
  if (cur || row.length) { row.push(cur); rows.push(row); }
  return rows;
}

function extractName(raw) {
  if (!raw) return '—';
  // Remove phone number and everything after it
  const cleaned = raw.replace(/\s*\d{10,12}.*/, '').replace(/\s+/g, ' ').trim();
  return cleaned || raw.split(' ').slice(0,2).join(' ');
}

function parseBool(v) {
  return v && v.trim().toUpperCase() === 'TRUE';
}

function parseStudents(csv) {
  const rows = parseCSV(csv);
  const result = [];
  // Data starts at row index 3 (0-based)
  for (let i = 3; i < rows.length; i++) {
    const r = rows[i];
    const numStr = (r[0] || '').trim();
    const rawName = (r[1] || '').trim();
    if (!rawName) continue;

    const modules = [];
    for (let m = 0; m < 8; m++) {
      const base = MOD_START + m * MOD_SIZE;
      modules.push({
        name: MODULE_HW[m],
        hwDone: parseBool(r[base]),
        hwComment: (r[base + 1] || '').trim(),
        meetingDone: parseBool(r[base + 2]),
        meetingComment: (r[base + 3] || '').trim(),
      });
    }

    const completedMods = modules.filter(m => m.hwDone && m.meetingDone).length;
    const curMod = modules.findIndex(m => !m.hwDone || !m.meetingDone);

    result.push({
      id: 'row_' + i,
      num: numStr,
      rawName,
      name: extractName(rawName),
      comment: (r[2] || '').trim(),
      startDate: (r[3] || '').trim(),
      contractSigned: parseBool(r[4]),
      hwPhoto: parseBool(r[5]),
      generalComment: (r[6] || '').trim(),
      problem: (r[7] || '').trim(),
      modules,
      completedMods,
      currentModule: curMod === -1 ? 8 : curMod,
      isDone: completedMods === 8,
    });
  }
  return result;
}

/* ===== LOAD DATA ===== */
async function loadData() {
  document.getElementById('studentList').innerHTML = '<div class="loading"><div class="spinner"></div><span>Загружаю данные...</span></div>';
  const urls = [
    SHEET_CSV,
    `https://corsproxy.io/?${encodeURIComponent('https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/export?format=csv')}`,
  ];
  let text = null;
  for (const url of urls) {
    try {
      const resp = await fetch(url + '&t=' + Date.now(), {cache:'no-store'});
      if (resp.ok) { text = await resp.text(); break; }
    } catch(e) { /* try next */ }
  }
  if (!text || !text.includes(',')) {
    document.getElementById('studentList').innerHTML = '<div class="empty"><div class="ei">⚠️</div><p>Не удалось загрузить данные.<br>Убедись что таблица открыта для просмотра и попробуй снова.</p></div>';
    return;
  }
  students = parseStudents(text);
  document.getElementById('lastUpdated').textContent = 'Обновлено: ' + new Date().toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'});
  renderList();
  toast('Данные загружены ✅');
}

/* ===== STATS ===== */
function renderStats() {
  const total = students.length;
  const done = students.filter(s => s.isDone).length;
  const noMeeting = students.filter(s => {
    const m = s.modules[s.currentModule > 0 ? s.currentModule - 1 : 0];
    return !s.isDone && s.currentModule > 0 && !s.modules[s.currentModule > 0 ? s.currentModule-1 : 0].meetingDone;
  }).length;
  const active = total - done;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="stat-num" style="color:var(--blue)">${total}</div><div class="stat-lbl">Всего</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#F59E0B">${active}</div><div class="stat-lbl">В процессе</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--green)">${done}</div><div class="stat-lbl">Завершили</div></div>`;
}

/* ===== FILTER & LIST ===== */
function setFilter(f) {
  curFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('on', c.dataset.f === f));
  renderList();
}

function renderList() {
  renderStats();
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let list = students;
  if (q) list = list.filter(s => s.name.toLowerCase().includes(q) || s.rawName.toLowerCase().includes(q));
  if (curFilter === 'active') list = list.filter(s => !s.isDone);
  if (curFilter === 'done') list = list.filter(s => s.isDone);
  if (curFilter === 'nomeeting') list = list.filter(s => {
    if (s.isDone) return false;
    const cm = s.currentModule;
    return cm > 0 && !s.modules[cm - 1].meetingDone;
  });

  const el = document.getElementById('studentList');
  if (list.length === 0) {
    el.innerHTML = `<div class="empty"><div class="ei">🎓</div><p>${students.length === 0 ? 'Загрузка...' : 'Никого не найдено'}</p></div>`;
    return;
  }

  el.innerHTML = list.map(s => {
    const initials = s.name.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
    const dots = s.modules.map((m, i) => {
      const cls = (m.hwDone && m.meetingDone) ? 'full' : m.hwDone ? 'hw' : (i === s.currentModule ? 'cur' : '');
      return `<div class="sc-dot ${cls}"></div>`;
    }).join('');
    const statusBadge = s.isDone
      ? '<span class="badge badge-done">✅ Завершил</span>'
      : `<span class="badge badge-active">Модуль ${s.currentModule + 1} из 8</span>`;
    return `<div class="student-card" onclick="openProfile('${s.id}')">
      <div class="sc-avatar">${initials}</div>
      <div class="sc-body">
        <div class="sc-name">${s.name}</div>
        <div class="sc-sub">Старт: ${s.startDate || '—'} · ${statusBadge}</div>
        <div class="sc-progress">${dots}</div>
      </div>
      <div class="sc-arrow">›</div>
    </div>`;
  }).join('');
}

/* ===== PROFILE ===== */
function openProfile(id) {
  curId = id;
  const s = students.find(x => x.id === id);
  if (!s) return;
  document.getElementById('phName').textContent = s.name;
  document.getElementById('phSub').textContent = `Старт: ${s.startDate || '—'}`;
  const statusBadge = s.isDone ? '✅ Завершил курс' : `📍 Модуль ${s.currentModule + 1} из 8`;
  document.getElementById('phBadges').innerHTML =
    `<span class="ph-badge">${statusBadge}</span>` +
    `<span class="ph-badge">${s.completedMods} модулей пройдено</span>` +
    (s.contractSigned ? '<span class="ph-badge">📄 Договор</span>' : '');
  showScreen('s-profile');
  switchTab('info');
}

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((b, i) => b.classList.toggle('on', ['info','modules','notes'][i] === t));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('on'));
  document.getElementById('tab-' + t).classList.add('on');
  if (t === 'info') renderTabInfo();
  if (t === 'modules') renderTabModules();
  if (t === 'notes') renderTabNotes();
}

function renderTabInfo() {
  const s = students.find(x => x.id === curId);
  if (!s) return;
  document.getElementById('tab-info').innerHTML = `
    <div class="info-card">
      <h4>Основное</h4>
      ${irow('Дата старта', s.startDate || '—')}
      ${irow('Договор подписан', s.contractSigned ? '✅ Да' : '❌ Нет')}
      ${irow('Фото-протокол', s.hwPhoto ? '✅ Сдан' : '❌ Нет')}
      ${irow('Пройдено модулей', `${s.completedMods} из 8`)}
    </div>
    ${s.problem ? `<div class="info-card"><h4>С чем пришёл</h4><p class="ir-text">${s.problem}</p></div>` : ''}
    ${s.generalComment ? `<div class="info-card"><h4>Комментарий</h4><p class="ir-text">${s.generalComment}</p></div>` : ''}
    ${s.comment ? `<div class="info-card"><h4>Доп. информация</h4><p class="ir-text">${s.comment}</p></div>` : ''}
    <div class="info-card">
      <h4>Полные данные</h4>
      <p class="ir-text" style="color:var(--muted);font-size:12px;">${s.rawName}</p>
    </div>`;
}

function irow(label, val) {
  return `<div class="info-row"><div class="ir-lbl">${label}</div><div class="ir-val">${val}</div></div>`;
}

function renderTabModules() {
  const s = students.find(x => x.id === curId);
  if (!s) return;
  document.getElementById('tab-modules').innerHTML = s.modules.map((m, i) => {
    const isCurrent = i === s.currentModule && !s.isDone;
    const isComplete = m.hwDone && m.meetingDone;
    const statusCls = isComplete ? 'ms-full' : isCurrent ? 'ms-cur' : m.hwDone ? 'ms-hw' : 'ms-none';
    const statusTxt = isComplete ? '✅ Пройден' : isCurrent ? '🔵 Текущий' : m.hwDone ? '📝 ДЗ сдано' : '⬜ Не начат';
    return `<div class="module-item">
      <div class="module-hdr">
        <div class="module-name">Модуль ${i + 1}</div>
        <span class="module-status ${statusCls}">${statusTxt}</span>
      </div>
      <div class="module-row"><span class="mcheck">${m.hwDone ? '✅' : '⬜'}</span><span class="module-sub">${m.name}</span></div>
      ${m.hwComment ? `<div class="module-comment">💬 ${m.hwComment}</div>` : ''}
      <div class="module-row" style="margin-top:4px"><span class="mcheck">${m.meetingDone ? '✅' : '⬜'}</span><span class="module-sub">Созвон проведён</span></div>
      ${m.meetingComment ? `<div class="module-comment">💬 ${m.meetingComment}</div>` : ''}
    </div>`;
  }).join('');
}

function renderTabNotes() {
  const note = notes[curId] || '';
  document.getElementById('tab-notes').innerHTML = `
    <div class="note-area">
      <h4>Личные заметки куратора</h4>
      <textarea id="noteText" placeholder="Заметки видны только тебе — сложности, договорённости, наблюдения...">${note}</textarea>
      <button class="note-save" onclick="saveNote()">Сохранить</button>
    </div>
    <p style="font-size:12px;color:var(--muted);text-align:center;">Заметки хранятся на этом устройстве</p>`;
}

function saveNote() {
  notes[curId] = document.getElementById('noteText').value;
  saveNotes();
  toast('Заметка сохранена ✅');
  if (tg) tg.HapticFeedback.notificationOccurred('success');
}

/* ===== INIT ===== */
loadData();
</script>
</body>
</html>

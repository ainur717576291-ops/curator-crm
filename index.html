<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Курс: Ученики</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#3B82F6;--blue-d:#2563EB;--blue-l:#EFF6FF;
  --green:#22C55E;--green-l:#F0FDF4;
  --amber:#F59E0B;--amber-l:#FFFBEB;
  --red:#EF4444;--red-l:#FEF2F2;
  --gray:#6B7280;--gray-l:#F9FAFB;--gray-m:#E5E7EB;
  --ink:#111827;--muted:#6B7280;--bg:#F3F4F6;--card:#fff;
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}

.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}

.hdr{background:#fff;padding:12px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--gray-m);position:sticky;top:0;z-index:10;padding-top:calc(12px + env(safe-area-inset-top));}
.hdr-title{font-size:16px;font-weight:700;flex:1;}
.hdr-sub{font-size:11px;color:var(--muted);font-weight:400;}
.icon-btn{width:36px;height:36px;border-radius:10px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0;}
.icon-btn-primary{background:var(--blue);color:#fff;font-size:22px;font-weight:300;}
.icon-btn-ghost{background:var(--gray-l);color:var(--muted);}

.content{flex:1;padding:12px 12px 24px;overflow-y:auto;}

.search-wrap{position:relative;margin-bottom:8px;}
.search-wrap input{width:100%;padding:9px 12px 9px 36px;border:1.5px solid var(--gray-m);border-radius:11px;font-family:inherit;font-size:14px;color:var(--ink);background:#fff;outline:none;}
.search-wrap input:focus{border-color:var(--blue);}
.search-wrap .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;}

.filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:10px;scrollbar-width:none;}
.filters::-webkit-scrollbar{display:none;}
.chip{border:1.5px solid var(--gray-m);background:#fff;border-radius:18px;padding:5px 12px;font-family:inherit;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.chip.on{border-color:var(--blue);background:var(--blue-l);color:var(--blue-d);}

.stats-bar{display:flex;gap:7px;margin-bottom:10px;}
.stat-card{flex:1;background:#fff;border-radius:11px;padding:9px 6px;box-shadow:var(--shadow);text-align:center;}
.stat-num{font-size:19px;font-weight:800;}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:1px;}

.student-card{background:var(--card);border-radius:13px;padding:12px;margin-bottom:7px;box-shadow:var(--shadow);cursor:pointer;display:flex;align-items:flex-start;gap:10px;}
.sc-avatar{width:40px;height:40px;border-radius:11px;background:var(--blue-l);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--blue-d);flex-shrink:0;}
.sc-body{flex:1;min-width:0;}
.sc-name{font-size:14px;font-weight:600;}
.sc-sub{font-size:11px;color:var(--muted);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.sc-progress{display:flex;gap:3px;margin-top:6px;}
.sc-dot{width:22px;height:5px;border-radius:3px;background:var(--gray-m);}
.sc-dot.full{background:var(--green);}
.sc-dot.partial{background:var(--amber);}
.sc-dot.cur{background:var(--blue);}
.badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;display:inline-block;}
.badge-active{background:var(--green-l);color:#15803D;}
.badge-frozen{background:#DBEAFE;color:#1D4ED8;}
.badge-done{background:var(--gray-l);color:var(--gray);}
.sc-arr{color:var(--gray-m);font-size:18px;align-self:center;}

.empty{text-align:center;padding:40px 16px;color:var(--muted);}
.empty .ei{font-size:40px;margin-bottom:8px;}

/* PROFILE */
.profile-hero{background:linear-gradient(135deg,#1e3a5f,#2563EB);color:#fff;padding:14px;padding-top:calc(14px + env(safe-area-inset-top));}
.ph-back{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.18);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-bottom:8px;}
.ph-name{font-size:19px;font-weight:800;margin-bottom:2px;}
.ph-sub{font-size:12px;opacity:.8;}
.ph-badges{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap;}
.ph-badge{padding:3px 10px;border-radius:8px;font-size:11px;font-weight:600;background:rgba(255,255,255,.18);cursor:pointer;}

.tabs{display:flex;background:#fff;border-bottom:1px solid var(--gray-m);position:sticky;top:0;z-index:5;}
.tab{flex:1;padding:10px 4px;border:none;background:none;font-family:inherit;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;}
.tab.on{color:var(--blue-d);border-bottom-color:var(--blue);}
.tab-content{display:none;padding:12px 12px 24px;}
.tab-content.on{display:block;}

.info-card{background:#fff;border-radius:13px;padding:12px;margin-bottom:9px;box-shadow:var(--shadow);}
.info-card h4{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--gray-l);}
.info-row:last-child{border-bottom:none;padding-bottom:0;}
.ir-lbl{font-size:12px;color:var(--muted);flex-shrink:0;margin-right:8px;}
.ir-val{font-size:12px;font-weight:500;text-align:right;}
.ir-text{font-size:13px;line-height:1.55;margin-top:2px;}

.module-item{background:#fff;border-radius:13px;padding:12px;margin-bottom:7px;box-shadow:var(--shadow);}
.module-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.module-name{font-size:13px;font-weight:700;}
.module-status{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;}
.ms-full{background:var(--green-l);color:#15803D;}
.ms-partial{background:var(--amber-l);color:#B45309;}
.ms-none{background:var(--gray-l);color:var(--gray);}
.ms-cur{background:var(--blue-l);color:var(--blue-d);}
.module-row{display:flex;align-items:center;gap:7px;margin-top:5px;cursor:pointer;}
.mcheck{font-size:13px;}
.module-sub{font-size:12px;color:var(--muted);}
.module-comment{font-size:11px;color:var(--ink);background:var(--gray-l);border-radius:7px;padding:5px 8px;margin-top:5px;line-height:1.4;}
.add-note-btn{width:100%;padding:8px;border:1.5px dashed var(--gray-m);border-radius:10px;background:none;font-family:inherit;font-size:12px;color:var(--muted);cursor:pointer;margin-top:6px;}

/* SHEET */
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;display:none;align-items:flex-end;justify-content:center;}
.backdrop.show{display:flex;}
.sheet{width:100%;max-width:480px;background:#fff;border-radius:22px 22px 0 0;padding:18px 16px calc(20px + env(safe-area-inset-bottom));max-height:90vh;overflow-y:auto;animation:slideUp .28s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:none;}}
.sheet h3{font-size:17px;font-weight:700;margin-bottom:14px;}
.fld{margin-bottom:11px;}
.fld label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;}
.fld input,.fld select,.fld textarea{width:100%;padding:11px 13px;border:1.5px solid var(--gray-m);border-radius:11px;font-family:inherit;font-size:14px;color:var(--ink);outline:none;background:#fff;resize:vertical;}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--blue);}
.fld textarea{min-height:70px;}
.seg2{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.seg2 button{border:1.5px solid var(--gray-m);background:#fff;border-radius:10px;padding:7px 12px;font-family:inherit;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;}
.seg2 button.on{border-color:var(--blue);background:var(--blue-l);color:var(--blue-d);}
.btn-primary{width:100%;background:var(--blue);color:#fff;border:none;border-radius:12px;padding:13px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;}
.btn-danger{width:100%;background:var(--red-l);color:var(--red);border:none;border-radius:12px;padding:12px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;margin-top:6px;}
.btn-ghost{width:100%;background:none;color:var(--muted);border:none;padding:9px;font-family:inherit;font-size:12px;cursor:pointer;margin-top:2px;}

.toggle-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--gray-l);border-radius:11px;cursor:pointer;margin-bottom:12px;}
.toggle{width:42px;height:24px;border-radius:12px;background:var(--gray-m);position:relative;transition:.2s;flex-shrink:0;}
.toggle.on{background:var(--blue);}
.toggle-knob{width:20px;height:20px;border-radius:10px;background:#fff;position:absolute;top:2px;left:2px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle.on .toggle-knob{left:20px;}
.toggle-lbl{font-size:13px;font-weight:600;}
.toggle-sub{font-size:11px;color:var(--muted);}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:160px;gap:10px;color:var(--muted);}
.spinner{width:28px;height:28px;border:3px solid var(--gray-m);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.toast{position:fixed;bottom:calc(16px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:9px 16px;border-radius:10px;font-size:12px;font-weight:600;z-index:100;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

.month-filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:8px;scrollbar-width:none;}
.month-filters::-webkit-scrollbar{display:none;}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--gray-m);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:20;}
.bnav-btn{flex:1;border:none;background:none;padding:10px 4px 8px;font-family:inherit;font-size:10px;font-weight:600;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bnav-btn .bni{font-size:22px;line-height:1;}
.bnav-btn.on{color:var(--blue-d);}
.has-nav .content{padding-bottom:80px;}
.pd{width:14px;height:14px;border-radius:50%;background:var(--gray-m);}
.pd.filled{background:var(--blue);}
.pin-key{padding:16px;border:1.5px solid var(--gray-m);border-radius:12px;background:#fff;font-family:inherit;font-size:18px;font-weight:700;cursor:pointer;}
</style>
</head>
<body>

<!-- DASHBOARD -->
<div class="screen" id="s-dashboard">
  <div class="hdr">
    <button class="icon-btn icon-btn-ghost" onclick="showScreen('s-list')">←</button>
    <div class="hdr-title" style="flex:1">📊 Дашборд</div>
    <button class="icon-btn icon-btn-ghost" onclick="renderDashboard()">↻</button>
  </div>
  <div style="padding:10px 12px 0;">
    <button onclick="exportCSV()" style="width:100%;padding:12px;background:var(--green-l);color:#15803D;border:1.5px solid var(--green);border-radius:11px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;">📤 Скачать Excel (CSV)</button>
  </div>
  <div class="content" id="dashContent"></div>
</div>

<!-- ROLE SELECTION -->
<div class="screen active" id="s-role" style="background:linear-gradient(160deg,#1e3a5f,#1D4ED8);color:#fff;align-items:center;justify-content:center;padding:24px;">
  <div style="font-size:48px;margin-bottom:16px;">👩‍🎓</div>
  <div style="font-size:22px;font-weight:800;margin-bottom:8px;">Курс: Ученики</div>
  <div style="font-size:14px;opacity:.75;margin-bottom:32px;">Выберите как вы входите</div>
  <button onclick="loginSenior()" style="width:100%;max-width:340px;background:#fff;color:#1D4ED8;border:none;border-radius:14px;padding:16px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;gap:10px;">
    <span style="font-size:22px;">⭐</span><span>Старший куратор<br><span style="font-size:12px;font-weight:400;color:#6B7280;">Управление всей системой</span></span>
  </button>
  <div style="width:100%;max-width:340px;" id="curatorLoginList"></div>
  <div id="roleLoading" style="margin-top:16px;font-size:13px;opacity:.7;">Загрузка кураторов...</div>
</div>

<!-- LIST -->
<div class="screen" id="s-list">
  <div class="hdr">
    <button class="icon-btn icon-btn-ghost" onclick="logout()" title="Выход">←</button>
    <div style="flex:1;margin-left:4px;">
      <div class="hdr-title" id="hdrTitle">Ученики курса</div>
      <div class="hdr-sub" id="lastUpdated">Загрузка...</div>
    </div>
    <button class="icon-btn icon-btn-ghost" onclick="openDashboard()" style="font-size:15px" title="Дашборд">📊</button>
    <button class="icon-btn icon-btn-ghost" onclick="loadStudents()">↻</button>
    <button class="icon-btn icon-btn-primary" id="addBtn" onclick="openAdd()" style="display:none">+</button>
    <button class="icon-btn icon-btn-ghost" id="mgmtBtn" onclick="openCuratorMgmt()" style="display:none;font-size:14px;">⚙️</button>
  </div>
  <div class="content">
    <div class="stats-bar" id="statsBar"></div>
    <div class="search-wrap">
      <span class="si">🔍</span>
      <input type="search" placeholder="Поиск по имени..." id="searchInput" oninput="renderList()">
    </div>
    <div class="filters" id="statusFilters">
      <button class="chip on" data-f="all" onclick="setFilter('all')">Все</button>
      <button class="chip" data-f="active" onclick="setFilter('active')">Активные</button>
      <button class="chip" data-f="frozen" onclick="setFilter('frozen')">❄️ Заморожены</button>
      <button class="chip" data-f="done" onclick="setFilter('done')">Завершили</button>
      <button class="chip" data-f="group" onclick="setFilter('group')">👥 Группа</button>
      <button class="chip" data-f="individual" onclick="setFilter('individual')">👤 Инд. куратор</button>
      <button class="chip" data-f="ainur" onclick="setFilter('ainur')">⭐ Инд. Айнур</button>
    </div>
    <!-- Month filters: all 12 always shown -->
    <div class="month-filters" id="monthFilters"></div>
    <div id="studentList"><div class="loading"><div class="spinner"></div><span>Загрузка...</span></div></div>
  </div>
  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <button class="bnav-btn on" id="nav-list" onclick="navTo('list')"><span class="bni">👥</span>Ученики</button>
    <button class="bnav-btn" id="nav-dash" onclick="navTo('dash')"><span class="bni">📊</span>Дашборд</button>
    <button class="bnav-btn" id="nav-add" onclick="openAdd()" style="display:none" id="nav-add-btn"><span class="bni">➕</span>Добавить</button>
    <button class="bnav-btn" id="nav-mgmt" onclick="openCuratorMgmt()" style="display:none"><span class="bni">⚙️</span>Кураторы</button>
    <button class="bnav-btn" id="nav-exit" onclick="logout()"><span class="bni">🚪</span>Выйти</button>
  </nav>
</div>

<!-- PROFILE -->
<div class="screen" id="s-profile">
  <div class="profile-hero">
    <button class="ph-back" onclick="showScreen('s-list')">←</button>
    <div class="ph-name" id="phName">—</div>
    <div class="ph-sub" id="phSub">—</div>
    <div class="ph-badges" id="phBadges"></div>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="switchTab('info')">📋 Инфо</button>
    <button class="tab" onclick="switchTab('modules')">📚 Модули</button>
    <button class="tab" onclick="switchTab('notes')">✏️ Заметки</button>
  </div>
  <div class="tab-content on" id="tab-info"></div>
  <div class="tab-content" id="tab-modules"></div>
  <div class="tab-content" id="tab-notes"></div>
</div>

<!-- SHEET: ADD/EDIT STUDENT -->
<div class="backdrop" id="bd-student" onclick="if(event.target===this)closeSheet('bd-student')">
<div class="sheet">
  <h3 id="sheetTitle">Новый ученик</h3>
  <div class="fld"><label>Имя и фамилия *</label><input id="f-name" placeholder="Айнур Жанузак"></div>
  <div class="fld"><label>Телефон</label><input id="f-phone" type="tel" placeholder="87001234567"></div>
  <div class="fld"><label>Ник Telegram</label><input id="f-tg" placeholder="@username"></div>
  <div class="fld"><label>Куратор</label><input id="f-curator" placeholder="Имя куратора" list="curatorList"><datalist id="curatorList"></datalist></div>
  <div class="fld"><label>Тариф</label>
    <div class="seg2" id="tariffSeg">
      <button class="on" data-t="group" onclick="setTariff('group')">👥 В группе</button>
      <button data-t="individual" onclick="setTariff('individual')">👤 Инд. с куратором</button>
      <button data-t="ainur" onclick="setTariff('ainur')">⭐ Инд. с Айнур</button>
    </div>
  </div>
  <div class="fld"><label>Дата входа</label><input id="f-start" type="date"></div>
  <div class="fld"><label>Статус</label>
    <div class="seg2" id="statusSeg">
      <button class="on" data-s="active" onclick="setStatus('active')">🟢 Активен</button>
      <button data-s="frozen" onclick="setStatus('frozen')">❄️ Заморожен</button>
      <button data-s="done" onclick="setStatus('done')">✅ Завершил</button>
    </div>
  </div>
  <div class="fld" id="freezeDateFld" style="display:none"><label>❄️ Дата заморозки</label><input id="f-freeze" type="date"></div>
  <div class="fld"><label>С чем пришёл на курс</label><textarea id="f-problem" placeholder="Запрос, жалобы..."></textarea></div>
  <div class="fld"><label>Текущий этап</label><input id="f-progress" placeholder="Модуль 3, урок 2"></div>
  <div class="fld"><label>Результаты</label><textarea id="f-results" placeholder="Что уже получил..."></textarea></div>
  <div class="fld"><label>Сложности</label><textarea id="f-difficulties" placeholder="С чем испытывает трудности..."></textarea></div>
  <button class="btn-primary" id="saveBtn" onclick="saveStudent()">Сохранить</button>
  <button class="btn-danger" id="deleteBtn" style="display:none" onclick="deleteStudent()">Удалить ученика</button>
  <button class="btn-ghost" onclick="closeSheet('bd-student')">Отмена</button>
</div>
</div>

<!-- SHEET: MODULE NOTE -->
<div class="backdrop" id="bd-module" onclick="if(event.target===this)closeSheet('bd-module')">
<div class="sheet">
  <h3 id="moduleSheetTitle">Заметка к модулю</h3>
  <div class="fld"><label>Комментарий</label><textarea id="mod-comment" placeholder="Что обсудили, договорённости..."></textarea></div>
  <button class="btn-primary" onclick="saveModuleComment()">Сохранить</button>
  <button class="btn-ghost" onclick="closeSheet('bd-module')">Отмена</button>
</div>
</div>

<!-- SHEET: PIN ENTRY -->
<div class="backdrop" id="bd-pin">
<div class="sheet">
  <h3 id="pinTitle">🔐 Введите PIN</h3>
  <p style="color:var(--muted);font-size:13px;margin-bottom:16px;" id="pinSubtitle">Для входа как Старший куратор</p>
  <div style="display:flex;justify-content:center;gap:12px;margin-bottom:20px;" id="pinDots">
    <div class="pd"></div><div class="pd"></div><div class="pd"></div><div class="pd"></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:240px;margin:0 auto 16px;">
    <button class="pin-key" onclick="pinKey('1')">1</button>
    <button class="pin-key" onclick="pinKey('2')">2</button>
    <button class="pin-key" onclick="pinKey('3')">3</button>
    <button class="pin-key" onclick="pinKey('4')">4</button>
    <button class="pin-key" onclick="pinKey('5')">5</button>
    <button class="pin-key" onclick="pinKey('6')">6</button>
    <button class="pin-key" onclick="pinKey('7')">7</button>
    <button class="pin-key" onclick="pinKey('8')">8</button>
    <button class="pin-key" onclick="pinKey('9')">9</button>
    <div></div>
    <button class="pin-key" onclick="pinKey('0')">0</button>
    <button class="pin-key" onclick="pinBack()">⌫</button>
  </div>
  <button class="btn-ghost" onclick="closeSheet('bd-pin')">Отмена</button>
</div>
</div>

<!-- SHEET: LOG CALL -->
<div class="backdrop" id="bd-call" onclick="if(event.target===this)closeSheet('bd-call')">
<div class="sheet">
  <h3>📞 Записать созвон</h3>
  <div class="fld"><label>Дата созвона</label><input id="call-date" type="date"></div>

<script>

let pinBuffer = '';
let pinMode = 'check'; // 'check' | 'set' | 'confirm'
let pinNew = '';

function loginSenior() {
  const storedPin = (window._cfg && window._cfg.pin) ? window._cfg.pin : '1234';
  if (!window._cfg || !window._cfg.pin) {
    // No PIN set yet — ask to create one
    pinMode = 'set';
    document.getElementById('pinTitle').textContent = '🔐 Создайте PIN';
    document.getElementById('pinSubtitle').textContent = 'Придумайте 4-значный PIN для старшего куратора';
  } else {
    pinMode = 'check';
    document.getElementById('pinTitle').textContent = '🔐 Введите PIN';
    document.getElementById('pinSubtitle').textContent = 'Для входа как Старший куратор';
  }
  pinBuffer = '';
  pinNew = '';
  updatePinDots();
  openSheet('bd-pin');
}

function pinKey(k) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += k;
  updatePinDots();
  if (pinBuffer.length === 4) setTimeout(checkPin, 150);
}
function pinBack() {
  pinBuffer = pinBuffer.slice(0,-1);
  updatePinDots();
}
function updatePinDots() {
  document.querySelectorAll('.pd').forEach((d,i) => d.classList.toggle('filled', i < pinBuffer.length));
}
async function checkPin() {
  const storedPin = (window._cfg && window._cfg.pin) ? window._cfg.pin : '1234';
  if (pinMode === 'check') {
    if (pinBuffer === storedPin) {
      closeSheet('bd-pin');
      role = 'senior';
      localStorage.setItem(ROLE_KEY, 'senior');
      enterApp();
    } else {
      pinBuffer = '';
      updatePinDots();
      document.getElementById('pinSubtitle').textContent = '❌ Неверный PIN, попробуй снова';
      if (tg) tg.HapticFeedback.notificationOccurred('error');
    }
  } else if (pinMode === 'set') {
    pinNew = pinBuffer;
    pinBuffer = '';
    pinMode = 'confirm';
    document.getElementById('pinTitle').textContent = '🔐 Подтвердите PIN';
    document.getElementById('pinSubtitle').textContent = 'Введите PIN ещё раз';
    updatePinDots();
  } else if (pinMode === 'confirm') {
    if (pinBuffer === pinNew) {
      if (!window._cfg) window._cfg = {};
      window._cfg.pin = pinNew;
      await saveConfig();
      closeSheet('bd-pin');
      role = 'senior';
      localStorage.setItem(ROLE_KEY, 'senior');
      enterApp();
      toast('PIN установлен ✅');
    } else {
      pinBuffer = ''; pinNew = '';
      pinMode = 'set';
      document.getElementById('pinTitle').textContent = '🔐 Создайте PIN';
      document.getElementById('pinSubtitle').textContent = '❌ Не совпадает. Попробуй снова';
      updatePinDots();
    }

}

/* ===== LOAD CONFIG ===== */
async function loadConfig() {
  try {
    const rows = await sbGet('students', `id=eq.${CONFIG_ID}&select=notes`);
    if (rows && rows[0]) {
      window._cfg = JSON.parse(rows[0].notes || '{}');
      curators = window._cfg.curators || [];
    } else {
      window._cfg = {}; curators = [];
    }
  } catch(e) { window._cfg = {}; curators = []; }
}

async function saveConfig() {
  if (!window._cfg) window._cfg = {};
  window._cfg.curators = curators;
  const cfg = JSON.stringify(window._cfg);
  try {
    const existing = await sbGet('students', `id=eq.${CONFIG_ID}&select=id`);
    if (existing && existing[0]) {
      await sbUpdate('students', CONFIG_ID, { notes: cfg });
    } else {
      await fetch(`${SB_URL}/rest/v1/students`, {
        method: 'POST',
        headers: { ...sbHeaders, 'Prefer': 'return=minimal' },
        body: JSON.stringify({ id: CONFIG_ID, name: '__config__', notes: cfg, modules: [] })
      });
    }
  } catch(e) {}
}

/* ===== LOAD STUDENTS ===== */
async function loadStudents() {
  document.getElementById('studentList').innerHTML = '<div class="loading"><div class="spinner"></div><span>Загрузка...</span></div>';
  try {
    const data = await sbGet('students', `id=neq.${CONFIG_ID}&order=created_at.asc`);
    if (Array.isArray(data)) {
      students = data;
      document.getElementById('lastUpdated').textContent = 'Обновлено ' + new Date().toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'});
      renderMonthFilters();
      renderList();
    } else throw new Error();
  } catch(e) {
    document.getElementById('studentList').innerHTML = '<div class="empty"><div class="ei">⚠️</div><p>Ошибка загрузки</p></div>';
  }
}

/* ===== STATS ===== */
function renderStats() {
  const list = role === 'senior' ? students : students.filter(s => s.curator === role);
  const active = list.filter(s => s.status === 'active').length;
  const frozen = list.filter(s => s.status === 'frozen').length;
  const done = list.filter(s => s.status === 'done').length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card"><div class="stat-num" style="color:var(--blue)">${list.length}</div><div class="stat-lbl">Всего</div></div>

    <div class="stat-card"><div class="stat-num" style="color:var(--gray)">${done}</div><div class="stat-lbl">Завершили</div></div>`;
}

/* ===== MONTH FILTERS ===== */
function renderMonthFilters() {
  const counts = new Array(12).fill(0);
  students.forEach(s => {
    if (s.start_date) {
      const m = new Date(s.start_date).getMonth();
      if (!isNaN(m)) counts[m]++;
    }
  });
  const el = document.getElementById('monthFilters');
  el.innerHTML = '<button class="chip on" data-m="all" onclick="setMonth(\'all\')">📅 Все</button>' +
    MONTH_SHORT.map((name, i) => {
      const cnt = counts[i];
      return `<button class="chip" data-m="${i}" onclick="setMonth('${i}')" style="${cnt===0?'opacity:.4':''}">${name}${cnt?' ('+cnt+')':''}</button>`;
    }).join('');
}

}
function setMonth(m) {

  document.querySelectorAll('#monthFilters .chip').forEach(c => c.classList.toggle('on', c.dataset.m === String(m)));

function renderRoleScreen() {
  document.getElementById('curatorLoginList').innerHTML = curators.map(c =>
    `<button onclick="loginCurator('${c.replace(/'/g,"\\'")}') " style="width:100%;background:rgba(255,255,255,.15);color:#fff;border:1.5px solid rgba(255,255,255,.3);border-radius:14px;padding:14px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px;text-align:left;display:flex;align-items:center;gap:10px;">
      <span style="font-size:20px;">👤</span><span>${c}</span>
    </button>`
  ).join('');
  document.getElementById('roleLoading').style.display = 'none';
}

function getModuleProgress(s) {
  const mods = s.modules || [];
  const completed = mods.filter(m => m.hw && m.meeting).length;
  const current = mods.findIndex(m => !m.hw || !m.meeting);
  return { completed, current: current === -1 ? mods.length : current };
}

/* ===== LIST ===== */
function renderList() {
  renderStats();
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let list = role === 'senior' ? [...students] : students.filter(s => s.curator === role);

  if (q) list = list.filter(s => (s.name||'').toLowerCase().includes(q) || (s.phone||'').includes(q));
  if (curFilter === 'active') list = list.filter(s => s.status === 'active');
  else if (curFilter === 'frozen') list = list.filter(s => s.status === 'frozen');
  else if (curFilter === 'done') list = list.filter(s => s.status === 'done');
  else if (['group','individual','ainur'].includes(curFilter)) list = list.filter(s => s.tariff === curFilter);
  if (curMonth !== 'all') list = list.filter(s => s.start_date && new Date(s.start_date).getMonth() === parseInt(curMonth));

  const el = document.getElementById('studentList');
  if (!list.length) {
    const isSenior = role === 'senior';
    el.innerHTML = `<div class="empty"><div class="ei">🎓</div><p>${isSenior && !students.length ? 'Нет учеников. Нажми + чтобы добавить' : 'Никого не найдено'}</p></div>`;
    return;
  }

  el.innerHTML = list.map(s => {
    const initials = (s.name||'?').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
    const prog = getModuleProgress(s);
    const mods = s.modules || [];
    const dots = Array.from({length:8},(_,i) => {
      const m = mods[i];
      const cls = m ? (m.hw&&m.meeting?'full':m.hw||m.meeting?'partial':'') : (i===prog.current?'cur':'');
      return `<div class="sc-dot ${cls}"></div>`;
    }).join('');
    const days = getDaysSinceContact(s);
    const noContactFlag = s.status==='active' && (days===null||days>=NO_CONTACT_DAYS) ? `<span class="badge" style="background:var(--red-l);color:var(--red);">⚠️ ${days===null?'Нет созвона':days+'дн.'}</span>` : '';
    const sb = s.status==='frozen'?'<span class="badge badge-frozen">❄️ Заморожен</span>'
      : s.status==='done'?'<span class="badge badge-done">✅ Завершил</span>'
      : `<span class="badge badge-active">${prog.completed}/8 модулей</span>`;
    const tariffTxt = s.tariff==='ainur'?'⭐ Инд.Айнур':s.tariff==='individual'?'👤 Инд.':'👥 Группа';
    return `<div class="student-card" onclick="openProfile('${s.id}')">
      <div class="sc-avatar" style="${s.status==='frozen'?'background:#DBEAFE;color:#1D4ED8':''}">${s.status==='frozen'?'❄️':initials}</div>
      <div class="sc-body">
        <div class="sc-name">${s.name||'—'}</div>
        <div class="sc-sub">${sb}${noContactFlag}<span>${tariffTxt}</span>${s.curator?`<span>👤 ${s.curator}</span>`:''}</div>
        <div class="sc-progress">${dots}</div>
      </div>
      <div class="sc-arr">›</div>
    </div>`;
  }).join('');

  // update curator datalist
  document.getElementById('curatorList').innerHTML = curators.map(c=>`<option value="${c}">`).join('');
}

/* ===== ADD / EDIT STUDENT ===== */
function openAdd() {
  editId = null;
  selectedTariff = 'group';
  selectedStatus = 'active';
  document.getElementById('sheetTitle').textContent = 'Новый ученик';
  document.getElementById('f-name').value = '';
  document.getElementById('f-phone').value = '';
  document.getElementById('f-tg').value = '';
  document.getElementById('f-curator').value = '';
  document.getElementById('f-start').value = new Date().toISOString().slice(0,10);
  document.getElementById('f-problem').value = '';
  document.getElementById('f-progress').value = '';
  document.getElementById('f-results').value = '';
  document.getElementById('f-difficulties').value = '';
  document.getElementById('f-freeze').value = '';
  document.getElementById('deleteBtn').style.display = 'none';
  setTariff('group'); setStatus('active');
  openSheet('bd-student');
  setTimeout(() => document.getElementById('f-name').focus(), 150);
}

function openEdit() {
  const s = students.find(x => x.id === curId);
  if (!s) return;
  editId = s.id;
  selectedTariff = s.tariff || 'group';
  selectedStatus = s.status || 'active';
  document.getElementById('sheetTitle').textContent = 'Редактировать';
  document.getElementById('f-name').value = s.name || '';
  document.getElementById('f-phone').value = s.phone || '';
  document.getElementById('f-tg').value = s.telegram || '';
  document.getElementById('f-curator').value = s.curator || '';
  document.getElementById('f-start').value = s.start_date || '';
  document.getElementById('f-problem').value = s.problem || '';
  document.getElementById('f-progress').value = s.progress || '';
  document.getElementById('f-results').value = s.results || '';
  document.getElementById('f-difficulties').value = s.difficulties || '';
  document.getElementById('f-freeze').value = (s.modules && s.modules[9] && s.modules[9].freeze_date) || '';
  document.getElementById('deleteBtn').style.display = 'block';
  setTariff(selectedTariff); setStatus(selectedStatus);
  openSheet('bd-student');
}

function setTariff(t) {
  selectedTariff = t;
  document.querySelectorAll('#tariffSeg button').forEach(b => b.classList.toggle('on', b.dataset.t === t));
}
function setStatus(s) {
  selectedStatus = s;
  document.querySelectorAll('#statusSeg button').forEach(b => b.classList.toggle('on', b.dataset.s === s));
  document.getElementById('freezeDateFld').style.display = s === 'frozen' ? 'block' : 'none';
  if (s === 'frozen' && !document.getElementById('f-freeze').value) {
    document.getElementById('f-freeze').value = new Date().toISOString().slice(0,10);
  }
}

async function saveStudent() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { toast('Введи имя ученика'); return; }
  const btn = document.getElementById('saveBtn');
  btn.textContent = 'Сохраняю...'; btn.disabled = true;
  const data = {
    name,
    phone: document.getElementById('f-phone').value.trim(),
    telegram: document.getElementById('f-tg').value.trim(),
    curator: document.getElementById('f-curator').value.trim(),
    tariff: selectedTariff,
    status: selectedStatus,
    start_date: document.getElementById('f-start').value || null,
    problem: document.getElementById('f-problem').value.trim(),
    progress: document.getElementById('f-progress').value.trim(),
    results: document.getElementById('f-results').value.trim(),
    difficulties: document.getElementById('f-difficulties').value.trim(),
  };
  try {
    // Save freeze date into modules[9]
    const freezeDate = document.getElementById('f-freeze').value;
    if (editId) {
      const existing = students.find(x => x.id === editId);
      const mods = [...((existing && existing.modules) || [])];
      while (mods.length <= 9) mods.push({});
      mods[9] = { ...mods[9], freeze_date: data.status === 'frozen' ? (freezeDate || new Date().toISOString().slice(0,10)) : null };
      data.modules = mods;
      await sbUpdate('students', editId, data);
      toast('Сохранено ✅');
    } else {
      data.modules = [{},...Array(9).fill({})];
      if (data.status === 'frozen') data.modules[9] = { freeze_date: freezeDate || new Date().toISOString().slice(0,10) };
      await sbInsert('students', data);
      toast('Ученик добавлен ✅');
      if (tg) tg.HapticFeedback.notificationOccurred('success');
    }
    closeSheet('bd-student');
    await loadStudents();
    if (editId) { openProfile(editId); }
  } catch(e) {
    toast('Ошибка сохранения');
  }
  btn.textContent = 'Сохранить'; btn.disabled = false;
}

async function deleteStudent() {
  const doIt = async () => {
    await sbDelete('students', curId);
    showScreen('s-list');
    await loadStudents();
    toast('Ученик удалён');
  };
  if (tg) tg.showConfirm('Удалить ученика?', ok => { if(ok) doIt(); });
  else if (confirm('Удалить?')) doIt();
}

/* ===== PROFILE ===== */
function openProfile(id) {
  curId = id;
  const s = students.find(x => x.id === id);
  if (!s) return;
  const prog = getModuleProgress(s);
  document.getElementById('phName').textContent = s.name || '—';
  document.getElementById('phSub').textContent = [s.curator ? '👤 '+s.curator : '', s.start_date ? 'с '+fmtDate(s.start_date) : ''].filter(Boolean).join(' · ') || '—';
  const sb = s.status==='frozen'?'❄️ Заморожен':s.status==='done'?'✅ Завершил курс':`📍 ${prog.completed}/8 модулей`;
  const canEdit = role === 'senior' || s.curator === role;
  document.getElementById('phBadges').innerHTML =
    `<span class="ph-badge">${sb}</span>` +
    (s.tariff==='ainur'?'<span class="ph-badge">⭐ Инд.Айнур</span>':s.tariff==='individual'?'<span class="ph-badge">👤 Инд.куратор</span>':'<span class="ph-badge">👥 Группа</span>') +
    (canEdit ? `<span class="ph-badge" onclick="openEdit()" style="cursor:pointer">✏️ Изменить</span>` : '');
  showScreen('s-profile');
  switchTab('info');
}

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('on', ['info','modules','notes'][i]===t));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('on'));
  document.getElementById('tab-'+t).classList.add('on');
  if (t==='info') renderInfo();
  if (t==='modules') renderModules();
  if (t==='notes') renderNotes();
}

function fmtDate(ds) {
  if (!ds) return '—';
  const d = new Date(ds);
  if (isNaN(d)) return ds;
  return d.toLocaleDateString('ru-RU', {day:'numeric',month:'long'});
}

function renderInfo() {
  const s = students.find(x => x.id === curId);
  if (!s) return;
  const tgLink = s.telegram ? `<a href="https://t.me/${s.telegram.replace('@','')}" style="color:var(--blue)">${s.telegram}</a>` : '—';
  document.getElementById('tab-info').innerHTML = `
    <div class="info-card">
      <h4>Контакты</h4>
      ${irow('Телефон', s.phone ? `<a href="tel:${s.phone}" style="color:var(--blue)">${s.phone}</a>` : '—')}
      ${irow('Telegram', tgLink)}
      ${irow('Куратор', s.curator || '—')}
      ${irow('Тариф', s.tariff==='ainur'?'⭐ Инд. с Айнур':s.tariff==='individual'?'👤 Инд. с куратором':'👥 В группе')}
    </div>
    <div class="info-card">
      <h4>Курс</h4>
      ${irow('Дата входа', fmtDate(s.start_date))}
      ${irow('Статус', s.status==='frozen'?'❄️ Заморожен':s.status==='done'?'✅ Завершил':'🟢 Активен')}
      ${s.status==='frozen' && s.modules && s.modules[9] && s.modules[9].freeze_date ? irow('Заморожен с', fmtDate(s.modules[9].freeze_date) + ` (${Math.floor((Date.now()-new Date(s.modules[9].freeze_date))/86400000)} дн.)`) : ''}
      ${irow('Этап', s.progress || '—')}
    </div>
    ${s.problem ? `<div class="info-card"><h4>С чем пришёл</h4><p class="ir-text">${s.problem}</p></div>` : ''}
    ${s.results ? `<div class="info-card"><h4>Результаты</h4><p class="ir-text">${s.results}</p></div>` : ''}
    ${s.difficulties ? `<div class="info-card"><h4>Сложности</h4><p class="ir-text">${s.difficulties}</p></div>` : ''}
    <div class="info-card">
      <h4>📞 История созвонов</h4>
      ${(() => {
        const calls = s.modules && s.modules[8] ? (s.modules[8].calls||[]) : [];
        const rows = calls.slice().reverse().map(c =>
          `<div class="info-row"><div class="ir-lbl">${fmtDate(c.date)}</div><div class="ir-val" style="text-align:left;flex:1;margin-left:8px;font-size:11px;">${c.note||'—'}</div></div>`
        ).join('') || '<p style="color:var(--muted);font-size:12px;">Созвонов ещё нет</p>';
        return rows;
      })()}
      <button onclick="openCallSheet()" style="margin-top:8px;width:100%;padding:9px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;">+ Записать созвон</button>
    </div>`;
}

function irow(l, v) { return `<div class="info-row"><div class="ir-lbl">${l}</div><div class="ir-val">${v}</div></div>`; }

function renderModules() {
  const s = students.find(x => x.id === curId);
  if (!s) return;
  const mods = s.modules || [];
  document.getElementById('tab-modules').innerHTML = MODULE_NAMES.map((name, i) => {
    const m = mods[i] || {};
    const prog = getModuleProgress(s);
    const isCur = i === prog.current && s.status === 'active';
    const isFull = m.hw && m.meeting;
    const sc = isFull ? 'ms-full' : isCur ? 'ms-cur' : (m.hw||m.meeting) ? 'ms-partial' : 'ms-none';
    const st = isFull ? '✅ Пройден' : isCur ? '🔵 Текущий' : (m.hw||m.meeting) ? '📝 В процессе' : '⬜ Не начат';
    return `<div class="module-item">
      <div class="module-hdr"><div class="module-name">${name}</div><span class="module-status ${sc}">${st}</span></div>
      <div class="module-row" onclick="toggleModule(${i},'hw')"><span class="mcheck">${m.hw?'✅':'⬜'}</span><span class="module-sub">Домашнее задание сдано</span></div>
      <div class="module-row" onclick="toggleModule(${i},'meeting')"><span class="mcheck">${m.meeting?'✅':'⬜'}</span><span class="module-sub">Созвон проведён</span></div>
      ${m.comment ? `<div class="module-comment">💬 ${m.comment}</div>` : ''}
      <button class="add-note-btn" onclick="openModuleNote(${i})">${m.comment ? '✏️ Изменить заметку' : '+ Добавить заметку'}</button>
    </div>`;
  }).join('');
}

async function toggleModule(idx, field) {
  const s = students.find(x => x.id === curId);
  if (!s) return;
  const mods = [...(s.modules || [])];
  while (mods.length <= idx) mods.push({});
  mods[idx] = { ...mods[idx], [field]: !mods[idx][field] };
  await sbUpdate('students', curId, { modules: mods });
  s.modules = mods;
  renderModules();
  if (tg) tg.HapticFeedback.impactOccurred('light');
}

function openModuleNote(idx) {
  editingModIdx = idx;
  const s = students.find(x => x.id === curId);
  const mods = s.modules || [];
  document.getElementById('moduleSheetTitle').textContent = `Заметка — Модуль ${idx+1}`;
  document.getElementById('mod-comment').value = (mods[idx]||{}).comment || '';
  openSheet('bd-module');
}

async function saveModuleComment() {
  const s = students.find(x => x.id === curId);
  const mods = [...(s.modules || [])];
  while (mods.length <= editingModIdx) mods.push({});
  mods[editingModIdx] = { ...mods[editingModIdx], comment: document.getElementById('mod-comment').value.trim() };
  await sbUpdate('students', curId, { modules: mods });
  s.modules = mods;
  closeSheet('bd-module');
  renderModules();
  toast('Заметка сохранена ✅');
}

function renderNotes() {
  const s = students.find(x => x.id === curId);
  if (!s) return;
  document.getElementById('tab-notes').innerHTML = `
    <div class="info-card">
      <h4>Общие заметки куратора</h4>
      <textarea id="notesText" placeholder="Наблюдения, договорённости, важные детали..." style="width:100%;border:1.5px solid var(--gray-m);border-radius:10px;padding:10px;font-family:inherit;font-size:13px;min-height:100px;outline:none;">${s.notes||''}</textarea>
      <button onclick="saveNotes()" style="margin-top:8px;padding:9px 16px;background:var(--blue);color:#fff;border:none;border-radius:9px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;">Сохранить</button>
    </div>`;
}

async function saveNotes() {
  const notes = document.getElementById('notesText').value;
  await sbUpdate('students', curId, { notes });
  const s = students.find(x => x.id === curId);
  if (s) s.notes = notes;
  toast('Заметки сохранены ✅');
  if (tg) tg.HapticFeedback.notificationOccurred('success');
}

/* ===== EXPORT CSV ===== */
function exportCSV() {
  const myStudents = role === 'senior' ? students : students.filter(s => s.curator === role);
  const headers = ['Имя','Телефон','Telegram','Куратор','Тариф','Статус','Дата входа','Заморожен с','Пройдено модулей','Текущий этап','Результаты','Последний созвон'];
  const rows = myStudents.map(s => {
    const prog = getModuleProgress(s);
    const freezeDate = s.modules && s.modules[9] && s.modules[9].freeze_date ? fmtDate(s.modules[9].freeze_date) : '';
    const lastCall = getLastContact(s);
    const tariffTxt = s.tariff==='ainur'?'Инд. с Айнур':s.tariff==='individual'?'Инд. с куратором':'В группе';
    const statusTxt = s.status==='frozen'?'Заморожен':s.status==='done'?'Завершил':'Активен';
    return [
      s.name||'', s.phone||'', s.telegram||'', s.curator||'',
      tariffTxt, statusTxt, fmtDate(s.start_date), freezeDate,
      prog.completed + '/8', s.progress||'', s.results||'',
      lastCall ? fmtDate(lastCall.date) + ' — ' + (lastCall.note||'') : ''
    ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(',');
  });
  const csv = '﻿' + [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'ученики_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click(); URL.revokeObjectURL(url);
  toast('Файл скачан ✅');
}

/* ===== CALL LOG ===== */
function getLastContact(s) {
  const calls = (s.modules && s.modules[8]) ? s.modules[8].calls || [] : [];
  if (!calls.length) return null;
  return calls[calls.length - 1];
}
function getDaysSinceContact(s) {
  const lc = getLastContact(s);
  if (!lc) return null;
  const diff = Date.now() - new Date(lc.date).getTime();
  return Math.floor(diff / 86400000);
}
function openCallSheet() {
  document.getElementById('call-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('call-note').value = '';
  openSheet('bd-call');
}
async function saveCall() {
  const s = students.find(x => x.id === curId);
  if (!s) return;
  const mods = [...(s.modules || [])];
  while (mods.length <= 8) mods.push({});
  const calls = [...(mods[8].calls || [])];
  calls.push({ date: document.getElementById('call-date').value, note: document.getElementById('call-note').value.trim() });
  mods[8] = { ...mods[8], calls };
  await sbUpdate('students', curId, { modules: mods });
  s.modules = mods;
  closeSheet('bd-call');
  renderInfo();
  toast('Созвон записан ✅');
  if (tg) tg.HapticFeedback.notificationOccurred('success');
}

/* ===== DASHBOARD ===== */
const NO_CONTACT_DAYS = 14;

function openDashboard() {
  renderDashboard();
  showScreen('s-dashboard');
}

function renderDashboard() {
  const isSenior = role === 'senior';
  const myStudents = isSenior ? students : students.filter(s => s.curator === role);
  const noContact = myStudents.filter(s => {
    const days = getDaysSinceContact(s);
    return s.status === 'active' && (days === null || days >= NO_CONTACT_DAYS);
  });

  let html = '';

  // Overall stats
  html += `<div class="info-card"><h4>Общая статистика</h4>
    ${irow('Всего учеников', myStudents.length)}
    ${irow('Активных', myStudents.filter(s=>s.status==='active').length)}
    ${irow('Заморожено', myStudents.filter(s=>s.status==='frozen').length)}
    ${irow('Завершили', myStudents.filter(s=>s.status==='done').length)}
  </div>`;

  // No contact alert
  if (noContact.length) {
    html += `<div class="info-card" style="border-left:3px solid var(--red);">
      <h4 style="color:var(--red);">⚠️ Нет созвона более ${NO_CONTACT_DAYS} дней (${noContact.length})</h4>
      ${noContact.map(s => {
        const days = getDaysSinceContact(s);
        return `<div class="info-row" style="cursor:pointer" onclick="openProfileFromDash('${s.id}')">
          <div class="ir-lbl">${s.name}</div>
          <div class="ir-val" style="color:var(--red)">${days === null ? 'Никогда' : days + ' дн.'}</div>
        </div>`;
      }).join('')}
    </div>`;
  } else {
    html += `<div class="info-card" style="border-left:3px solid var(--green);">
      <h4 style="color:var(--green);">✅ Все активные ученики имеют созвон в последние ${NO_CONTACT_DAYS} дней</h4>
    </div>`;
  }

  // Per-curator stats (senior only)
  if (isSenior && curators.length) {
    html += `<div class="info-card"><h4>По кураторам</h4>`;
    curators.forEach(c => {
      const cs = students.filter(s => s.curator === c);
      const cnc = cs.filter(s => { const d=getDaysSinceContact(s); return s.status==='active'&&(d===null||d>=NO_CONTACT_DAYS); });
      html += `<div class="info-row">
        <div class="ir-lbl">👤 ${c}</div>
        <div class="ir-val">${cs.length} уч. ${cnc.length?`<span style="color:var(--red);font-weight:700;">⚠️${cnc.length}</span>`:'✅'}</div>
      </div>`;
    });
    html += '</div>';
  }

  document.getElementById('dashContent').innerHTML = html;
}

function openProfileFromDash(id) {
  showScreen('s-list');
  setTimeout(() => openProfile(id), 50);
}

/* ===== INIT ===== */
(async () => {
  await loadConfig();
  renderRoleScreen();
  const saved = localStorage.getItem(ROLE_KEY);
  if (saved) {
    role = saved;
    enterApp();
  }
})();
</script>
